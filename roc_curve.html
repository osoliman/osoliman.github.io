<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROC Curve Diagram</title>
  <style>
    body {
      margin: 0;
      padding: 2rem;
      background: #ffffff;
      font-family: sans-serif;
      box-sizing: border-box;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a18; }
    }
    svg { width: 100%; max-width: 680px; display: block; margin: 0 auto; }

    /* Color variable shims for standalone use */
    :root {
      --p: #3d3d3a;
      --s: #73726c;
      --t: #73726c;
      --bg2: #f1efe8;
      --b: rgba(0,0,0,0.15);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --p: #c2c0b6;
        --s: #9c9a92;
        --t: #9c9a92;
        --bg2: #2c2c2a;
        --b: rgba(255,255,255,0.15);
      }
    }
    text { fill: var(--p); font-family: sans-serif; }
    text.ts { font-size: 12px; fill: var(--s); }
    text.th { font-size: 14px; font-weight: 500; fill: var(--p); }
  </style>
</head>
<body>
<svg viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Grid lines -->
  <line x1="100" y1="60" x2="100" y2="380" stroke="var(--t)" stroke-width="0.5" opacity="0.2"/>
  <line x1="180" y1="60" x2="180" y2="380" stroke="var(--t)" stroke-width="0.5" opacity="0.2"/>
  <line x1="260" y1="60" x2="260" y2="380" stroke="var(--t)" stroke-width="0.5" opacity="0.2"/>
  <line x1="340" y1="60" x2="340" y2="380" stroke="var(--t)" stroke-width="0.5" opacity="0.2"/>
  <line x1="420" y1="60" x2="420" y2="380" stroke="var(--t)" stroke-width="0.5" opacity="0.2"/>
  <line x1="500" y1="60" x2="500" y2="380" stroke="var(--t)" stroke-width="0.5" opacity="0.2"/>
  <line x1="580" y1="60" x2="580" y2="380" stroke="var(--t)" stroke-width="0.5" opacity="0.2"/>
  <line x1="100" y1="380" x2="580" y2="380" stroke="var(--t)" stroke-width="0.5" opacity="0.2"/>
  <line x1="100" y1="300" x2="580" y2="300" stroke="var(--t)" stroke-width="0.5" opacity="0.2"/>
  <line x1="100" y1="220" x2="580" y2="220" stroke="var(--t)" stroke-width="0.5" opacity="0.2"/>
  <line x1="100" y1="140" x2="580" y2="140" stroke="var(--t)" stroke-width="0.5" opacity="0.2"/>
  <line x1="100" y1="60" x2="580" y2="60" stroke="var(--t)" stroke-width="0.5" opacity="0.2"/>

  <!-- Random classifier diagonal -->
  <line x1="100" y1="380" x2="580" y2="60" stroke="var(--t)" stroke-width="1" stroke-dasharray="6 4" opacity="0.4"/>
  <text class="ts" x="560" y="85" text-anchor="middle" opacity="0.5">Random</text>

  <!-- Good ROC curve (high AUC) -->
  <path d="M100,380 C120,200 160,80 200,68 C280,55 400,58 580,60"
        fill="none" stroke="#3B8BD4" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Shaded AUC area -->
  <path d="M100,380 C120,200 160,80 200,68 C280,55 400,58 580,60 L580,380 Z"
        fill="#3B8BD4" opacity="0.08"/>

  <!-- Perfect classifier -->
  <path d="M100,380 L100,60 L580,60"
        fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
  <text class="ts" x="130" y="50" fill="#0F6E56" opacity="0.8">Perfect classifier</text>

  <!-- Axes -->
  <line x1="100" y1="390" x2="590" y2="390" stroke="var(--p)" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="90" y1="380" x2="90" y2="48" stroke="var(--p)" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- X axis label -->
  <text class="th" x="340" y="430" text-anchor="middle">False Positive Rate (FPR)</text>
  <text class="ts" x="340" y="446" text-anchor="middle">= FP / (FP + TN)   |   1 − Specificity</text>

  <!-- Y axis label (rotated) -->
  <text class="th" x="28" y="220" text-anchor="middle" transform="rotate(-90, 28, 220)">True Positive Rate (TPR)</text>
  <text class="ts" x="55" y="245" text-anchor="middle" transform="rotate(-90, 55, 245)">= TP / (TP + FN)   |   Recall</text>

  <!-- Tick labels X -->
  <text class="ts" x="100" y="400" text-anchor="middle" opacity="0.6">0</text>
  <text class="ts" x="340" y="400" text-anchor="middle" opacity="0.6">0.5</text>
  <text class="ts" x="580" y="400" text-anchor="middle" opacity="0.6">1</text>

  <!-- Tick labels Y -->
  <text class="ts" x="84" y="383" text-anchor="end" opacity="0.6">0</text>
  <text class="ts" x="84" y="223" text-anchor="end" opacity="0.6">0.5</text>
  <text class="ts" x="84" y="63" text-anchor="end" opacity="0.6">1</text>

  <!-- AUC label -->
  <text class="th" x="400" y="250" text-anchor="middle" fill="#185FA5">AUC ≈ 0.92</text>

  <!-- Threshold direction annotation -->
  <path d="M210,160 L270,200" stroke="#D85A30" stroke-width="1" stroke-dasharray="3 2" fill="none" marker-end="url(#arrow)"/>
  <text class="ts" x="200" y="155" text-anchor="middle" fill="#993C1D">Lower threshold →</text>
  <text class="ts" x="200" y="168" text-anchor="middle" fill="#993C1D">TPR↑, FPR↑</text>

  <!-- Corner annotation: top left = ideal -->
  <rect x="102" y="64" width="130" height="36" rx="6" fill="var(--bg2)" stroke="var(--b)" stroke-width="0.5"/>
  <text class="ts" x="167" y="79" text-anchor="middle">Top-left = ideal</text>
  <text class="ts" x="167" y="93" text-anchor="middle">TPR=1, FPR=0</text>
</svg>
</body>
</html>
