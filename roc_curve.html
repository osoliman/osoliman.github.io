<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROC Curve — Threshold Explorer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f4f0; --bg-info: #e6f1fb;
      --txt: #3d3d3a; --txt2: #73726c; --txt-info: #0c447c;
      --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
      --btn-hover: #f1efe8;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18; --bg2: #242422; --bg-info: #0c2d4a;
        --txt: #c2c0b6; --txt2: #9c9a92; --txt-info: #85b7eb;
        --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
        --btn-hover: #2c2c2a;
      }
    }
    body { background: var(--bg); color: var(--txt); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 2rem 1.5rem 2.5rem; }
    h1 { font-size: 17px; font-weight: 500; margin-bottom: 6px; }
    .subtitle { font-size: 13px; color: var(--txt2); margin-bottom: 1.6rem; }
    #roc-wrap { display: flex; gap: 28px; align-items: flex-start; flex-wrap: wrap; }
    #tbl-side { flex: 0 0 280px; }
    #chart-side { flex: 1; min-width: 280px; max-width: 460px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { border-bottom: 0.5px solid var(--border2); }
    th { padding: 6px 8px; text-align: center; font-weight: 500; font-size: 11px; color: var(--txt2); line-height: 1.4; }
    th.left { text-align: left; }
    .col-sub { display: block; font-size: 10px; font-weight: 400; opacity: 0.75; margin-top: 2px; }
    td { padding: 8px 8px; text-align: center; color: var(--txt); border-bottom: 0.5px solid var(--border); transition: background 0.3s, color 0.3s; font-size: 13px; }
    td.left { text-align: left; font-size: 12px; color: var(--txt2); }
    tr.active td { background: var(--bg-info); color: var(--txt-info); font-weight: 500; }
    tr.active td.left { color: var(--txt-info); }
    tr.done td { background: var(--bg2); }
    #ctrl { display: flex; gap: 8px; margin-top: 16px; align-items: center; flex-wrap: wrap; }
    button { font-size: 12px; padding: 6px 13px; border-radius: 8px; border: 0.5px solid var(--border2); background: transparent; color: var(--txt); cursor: pointer; transition: background 0.15s; font-family: inherit; }
    button:hover:not(:disabled) { background: var(--btn-hover); }
    button:active:not(:disabled) { transform: scale(0.97); }
    button:disabled { opacity: 0.3; cursor: default; }
    #btn-pause { min-width: 66px; }
    #step-label { font-size: 12px; color: var(--txt2); margin-left: 4px; }
    #status-bar { margin-top: 14px; font-size: 12px; color: var(--txt2); min-height: 18px; }
    svg { display: block; width: 100%; overflow: visible; }
  </style>
</head>
<body>
<h1>ROC curve — threshold explorer</h1>
<p class="subtitle">Each point corresponds to a classification threshold. Watch how TPR and FPR trade off as the threshold lowers.</p>

<div id="roc-wrap">
  <div id="tbl-side">
    <table>
      <thead>
        <tr>
          <th class="left">Threshold</th>
          <th>TPR <span class="col-sub">Sensitivity / Recall</span></th>
          <th>FPR <span class="col-sub">1 − Specificity</span></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="ctrl">
      <button id="btn-prev" disabled>← Prev</button>
      <button id="btn-pause">Pause</button>
      <button id="btn-next">Next →</button>
      <button id="btn-replay">Replay</button>
      <span id="step-label">0 / 5</span>
    </div>
    <div id="status-bar"></div>
  </div>

  <div id="chart-side">
    <svg id="svg-roc" viewBox="0 0 320 310"></svg>
  </div>
</div>

<script>
(function () {
  const pts = [
    { thr: '1.0  (all negative)', tpr: 0.00, fpr: 0.00 },
    { thr: '0.7',                  tpr: 0.40, fpr: 0.08 },
    { thr: '0.5',                  tpr: 0.72, fpr: 0.20 },
    { thr: '0.3',                  tpr: 0.90, fpr: 0.45 },
    { thr: '0.0  (all positive)',  tpr: 1.00, fpr: 1.00 },
  ];

  const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
  const clrAxis     = isDark ? '#c2c0b6' : '#3d3d3a';
  const clrSub      = isDark ? '#9c9a92' : '#73726c';
  const clrGrid     = isDark ? 'rgba(255,255,255,0.11)' : 'rgba(0,0,0,0.09)';
  const clrRand     = isDark ? 'rgba(255,255,255,0.20)' : 'rgba(0,0,0,0.18)';
  const clrCurve    = '#3B8BD4';
  const clrDotDone  = '#3B8BD4';
  const clrDotNew   = '#D85A30';
  const clrAUCfill  = isDark ? 'rgba(59,139,212,0.13)' : 'rgba(59,139,212,0.09)';

  /* Chart area inside 320×310 viewBox.
     Left pad is 48px — enough for tick labels.
     Y-axis label lives at x≈8 (after rotation) which is inside 0..320. */
  const VW = 320, VH = 310;
  const PAD = { l: 48, r: 14, t: 16, b: 52 };
  const cw = VW - PAD.l - PAD.r;
  const ch = VH - PAD.t - PAD.b;

  function px(fpr) { return PAD.l + fpr * cw; }
  function py(tpr) { return PAD.t + (1 - tpr) * ch; }

  const NS = 'http://www.w3.org/2000/svg';
  const svgEl = document.getElementById('svg-roc');

  function el(tag, attrs, parent) {
    const e = document.createElementNS(NS, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    if (parent) parent.appendChild(e);
    return e;
  }
  function tx(content, attrs, parent) {
    const e = el('text', attrs, parent);
    e.textContent = content;
    return e;
  }

  function buildBase() {
    const defs = el('defs', {}, svgEl);
    const mk = el('marker', { id:'arr', viewBox:'0 0 10 10', refX:'8', refY:'5', markerWidth:'5', markerHeight:'5', orient:'auto-start-reverse' }, defs);
    el('path', { d:'M2 1L8 5L2 9', fill:'none', stroke:clrAxis, 'stroke-width':'1.5', 'stroke-linecap':'round', 'stroke-linejoin':'round' }, mk);

    /* Grid + tick labels */
    for (let i = 0; i <= 4; i++) {
      const x = px(i/4), y = py(i/4);
      el('line', { x1:x, y1:PAD.t, x2:x, y2:PAD.t+ch, stroke:clrGrid, 'stroke-width':'0.5' }, svgEl);
      el('line', { x1:PAD.l, y1:y, x2:PAD.l+cw, y2:y, stroke:clrGrid, 'stroke-width':'0.5' }, svgEl);
      const lbl = (i/4).toFixed(2);
      if (i > 0 && i < 4) {
        tx(lbl, { x:x,       y:PAD.t+ch+13,  'text-anchor':'middle', 'font-size':'10', fill:clrSub }, svgEl);
        tx(lbl, { x:PAD.l-5, y:y+4,          'text-anchor':'end',    'font-size':'10', fill:clrSub }, svgEl);
      }
    }
    tx('0', { x:PAD.l,    y:PAD.t+ch+13, 'text-anchor':'middle', 'font-size':'10', fill:clrSub }, svgEl);
    tx('0', { x:PAD.l-5,  y:PAD.t+ch+4,  'text-anchor':'end',    'font-size':'10', fill:clrSub }, svgEl);
    tx('1', { x:PAD.l+cw, y:PAD.t+ch+13, 'text-anchor':'middle', 'font-size':'10', fill:clrSub }, svgEl);
    tx('1', { x:PAD.l-5,  y:PAD.t+4,     'text-anchor':'end',    'font-size':'10', fill:clrSub }, svgEl);

    /* Axes */
    el('line', { x1:PAD.l,   y1:PAD.t+ch+1, x2:PAD.l+cw+8, y2:PAD.t+ch+1, stroke:clrAxis, 'stroke-width':'1.2', 'marker-end':'url(#arr)' }, svgEl);
    el('line', { x1:PAD.l-1, y1:PAD.t+ch,   x2:PAD.l-1,    y2:PAD.t-8,    stroke:clrAxis, 'stroke-width':'1.2', 'marker-end':'url(#arr)' }, svgEl);

    /* X-axis label (two lines, centred below chart) */
    tx('FPR (1 − Specificity)', { x:PAD.l+cw/2, y:VH-22, 'text-anchor':'middle', 'font-size':'11', 'font-weight':'500', fill:clrAxis }, svgEl);
    tx('= FP / (FP + TN)', { x:PAD.l+cw/2, y:VH-9,  'text-anchor':'middle', 'font-size':'9', fill:clrSub }, svgEl);

    /* Y-axis label — two lines rotated 90°.
       Strategy: place text at (cx=8, cy=yMid±offset) horizontally, then
       rotate(-90, 8, yMid) so they spin into vertical orientation along the left edge.
       x=8 is safely inside the viewBox (left edge = 0). */
    const yMid = PAD.t + ch / 2;
    tx('TPR (Sensitivity / Recall)', {
      x:'8', y: String(yMid - 6),
      'text-anchor':'middle', 'font-size':'11', 'font-weight':'500', fill:clrAxis,
      transform:`rotate(-90,8,${yMid})`
    }, svgEl);
    tx('= TP / (TP + FN)  |  Recall', {
      x:'8', y: String(yMid + 6),
      'text-anchor':'middle', 'font-size':'9', fill:clrSub,
      transform:`rotate(-90,8,${yMid})`
    }, svgEl);

    /* Random diagonal */
    el('line', { x1:px(0), y1:py(0), x2:px(1), y2:py(1), stroke:clrRand, 'stroke-width':'1', 'stroke-dasharray':'4 3' }, svgEl);
    tx('random', { x:px(0.78), y:py(0.68)-5, 'text-anchor':'middle', 'font-size':'9', fill:clrSub }, svgEl);
  }

  /* Dynamic layers (drawn on top of base) */
  const aucPolyEl  = el('polygon', { points:'', fill:clrAUCfill, stroke:'none' }, svgEl);
  const segGroup   = el('g', {}, svgEl);
  const dotGroup   = el('g', {}, svgEl);
  const aucLabelEl = el('text', {
    x: String(px(0.56)), y: String(py(0.46)),
    'text-anchor':'middle', 'font-size':'13', 'font-weight':'500',
    fill:'#185FA5', opacity:'0', style:'transition: opacity 0.7s ease'
  }, svgEl);
  aucLabelEl.textContent = 'AUC ≈ 0.81';

  /* Table */
  const rows = [];
  (function buildTable() {
    const tbody = document.getElementById('tbody');
    pts.forEach(p => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td class="left">${p.thr}</td><td>${p.tpr.toFixed(2)}</td><td>${p.fpr.toFixed(2)}</td>`;
      tbody.appendChild(tr);
      rows.push(tr);
    });
  })();

  /* Animation helpers */
  function animateDot(dotEl, toR, dur, onDone) {
    const t0 = performance.now();
    (function frame(now) {
      const t = Math.min((now - t0) / dur, 1);
      dotEl.setAttribute('r', (toR * (1 - Math.pow(1-t, 2))).toFixed(2));
      if (t < 1) requestAnimationFrame(frame);
      else if (onDone) onDone();
    })(t0);
  }

  function animateSegment(segEl, dur, onDone) {
    const x1 = +segEl.getAttribute('x1'), y1 = +segEl.getAttribute('y1');
    const x2 = +segEl.getAttribute('x2'), y2 = +segEl.getAttribute('y2');
    const len = Math.hypot(x2-x1, y2-y1);
    segEl.setAttribute('stroke-dasharray', len);
    segEl.setAttribute('stroke-dashoffset', len);
    const t0 = performance.now();
    (function frame(now) {
      const t = Math.min((now - t0) / dur, 1);
      const ease = 1 - Math.pow(1-t, 3);
      segEl.setAttribute('stroke-dashoffset', (len * (1-ease)).toFixed(2));
      if (t < 1) requestAnimationFrame(frame);
      else if (onDone) onDone();
    })(t0);
  }

  /* renderStep:
     animate=true  → pop new dot, THEN draw the new segment line
     animate=false → instant snapshot (used for Prev / replay reset) */
  function renderStep(s, animate) {
    rows.forEach((r, i) => {
      r.className = i === s-1 ? 'active' : i < s-1 ? 'done' : '';
    });

    while (dotGroup.firstChild) dotGroup.removeChild(dotGroup.firstChild);
    while (segGroup.firstChild) segGroup.removeChild(segGroup.firstChild);

    const visible = pts.slice(0, s);

    if (!animate) {
      /* Instant: draw all segments and all dots */
      for (let i = 1; i < visible.length; i++) {
        el('line', {
          x1:px(visible[i-1].fpr), y1:py(visible[i-1].tpr),
          x2:px(visible[i].fpr),   y2:py(visible[i].tpr),
          stroke:clrCurve, 'stroke-width':'2', 'stroke-linecap':'round'
        }, segGroup);
      }
      visible.forEach((p, i) => {
        el('circle', {
          cx:px(p.fpr), cy:py(p.tpr), r:'5',
          fill: i === visible.length-1 ? clrDotNew : clrDotDone,
          stroke:'white', 'stroke-width':'1.5'
        }, dotGroup);
      });
    } else {
      /* Animated: previous segments + dots already drawn instantly,
         then pop new dot → draw new segment */
      for (let i = 1; i < visible.length - 1; i++) {
        el('line', {
          x1:px(visible[i-1].fpr), y1:py(visible[i-1].tpr),
          x2:px(visible[i].fpr),   y2:py(visible[i].tpr),
          stroke:clrCurve, 'stroke-width':'2', 'stroke-linecap':'round'
        }, segGroup);
      }
      visible.slice(0, -1).forEach((p, i) => {
        el('circle', {
          cx:px(p.fpr), cy:py(p.tpr), r:'5',
          fill: clrDotDone, stroke:'white', 'stroke-width':'1.5'
        }, dotGroup);
      });

      /* New dot pops first */
      const newP = visible[visible.length - 1];
      const newDot = el('circle', {
        cx:px(newP.fpr), cy:py(newP.tpr), r:'0',
        fill:clrDotNew, stroke:'white', 'stroke-width':'1.5'
      }, dotGroup);

      if (visible.length >= 2) {
        const prevP = visible[visible.length - 2];
        animateDot(newDot, 6, 300, () => {
          /* Then line draws from prev dot to new dot */
          const seg = el('line', {
            x1:px(prevP.fpr), y1:py(prevP.tpr),
            x2:px(newP.fpr),  y2:py(newP.tpr),
            stroke:clrCurve, 'stroke-width':'2', 'stroke-linecap':'round'
          }, segGroup);
          animateSegment(seg, 450);
        });
      } else {
        animateDot(newDot, 6, 300);
      }
    }

    /* AUC shading always reflects all visible points */
    if (visible.length >= 2) {
      let ap = visible.map(p => `${px(p.fpr)},${py(p.tpr)}`).join(' ');
      ap += ` ${px(visible[visible.length-1].fpr)},${py(0)} ${px(visible[0].fpr)},${py(0)}`;
      aucPolyEl.setAttribute('points', ap);
    } else {
      aucPolyEl.setAttribute('points', '');
    }

    aucLabelEl.setAttribute('opacity', s >= pts.length ? '1' : '0');
    updateUI();
  }

  /* Controls */
  let step = 0, autoTimer = null, isPaused = false;

  const btnPrev   = document.getElementById('btn-prev');
  const btnPause  = document.getElementById('btn-pause');
  const btnNext   = document.getElementById('btn-next');
  const btnReplay = document.getElementById('btn-replay');
  const stepLabel = document.getElementById('step-label');
  const statusBar = document.getElementById('status-bar');

  const descs = [
    '',
    'Threshold 1.0 — predict everything negative. TPR = 0, FPR = 0. Starting point.',
    'Threshold 0.7 — a few positives called. TPR rises to 0.40, FPR stays low at 0.08.',
    'Threshold 0.5 — balanced cut-off. TPR = 0.72, FPR = 0.20. Good trade-off zone.',
    'Threshold 0.3 — catching more positives but also more false alarms. TPR = 0.90, FPR = 0.45.',
    'Threshold 0.0 — predict everything positive. TPR = 1.0, FPR = 1.0. Top-right corner.',
  ];

  function updateUI() {
    stepLabel.textContent = `${step} / ${pts.length}`;
    statusBar.textContent = descs[step] || '';
    btnPrev.disabled  = step <= 0;
    btnNext.disabled  = step >= pts.length;
    btnPause.textContent = isPaused ? 'Resume' : 'Pause';
    btnPause.disabled = step >= pts.length && !isPaused;
  }

  function clearAuto() { if (autoTimer) { clearTimeout(autoTimer); autoTimer = null; } }

  function scheduleNext(delay) {
    clearAuto();
    if (!isPaused && step < pts.length) {
      autoTimer = setTimeout(() => {
        step++;
        renderStep(step, true);
        if (step < pts.length) scheduleNext(1100);
      }, delay);
    }
  }

  function autoPlay() {
    clearAuto(); isPaused = false; step = 0;
    renderStep(0, false);
    scheduleNext(500);
  }

  btnPrev.onclick   = () => { clearAuto(); isPaused = true; if (step > 0) { step--; renderStep(step, false); } updateUI(); };
  btnNext.onclick   = () => { clearAuto(); isPaused = true; if (step < pts.length) { step++; renderStep(step, true); } updateUI(); };
  btnPause.onclick  = () => {
    if (step >= pts.length) return;
    isPaused = !isPaused;
    if (!isPaused) scheduleNext(700); else clearAuto();
    updateUI();
  };
  btnReplay.onclick = autoPlay;

  buildBase();
  renderStep(0, false);
  autoPlay();
})();
</script>
</body>
</html>
